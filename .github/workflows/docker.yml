name: Build & push image to GHCR

# push 到 main 就自動 build（用 repo 根目錄的 Dockerfile）並推到 GHCR，
# 然後 Zeabur 直接拉這個 image，繞開 registry-oci.zeabur.cloud。
on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # = luffysky/ai-island-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags / labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEXT_PUBLIC_* 在 build 階段被 inline 進前端 bundle，
          # 從 repo「Variables」傳入（Settings → Secrets and variables → Actions → Variables）。
          # vars 沒設就 fallback 去讀 secrets（你設在哪邊都能讀到）
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_ADMIN_SLUG=${{ vars.NEXT_PUBLIC_ADMIN_SLUG || secrets.NEXT_PUBLIC_ADMIN_SLUG }}
            NEXT_PUBLIC_GA_ID=${{ vars.NEXT_PUBLIC_GA_ID || secrets.NEXT_PUBLIC_GA_ID }}
            NEXT_PUBLIC_GTM_ID=${{ vars.NEXT_PUBLIC_GTM_ID || secrets.NEXT_PUBLIC_GTM_ID }}
            NEXT_PUBLIC_LINE_CHANNEL_ID=${{ vars.NEXT_PUBLIC_LINE_CHANNEL_ID || secrets.NEXT_PUBLIC_LINE_CHANNEL_ID }}
            NEXT_PUBLIC_CONTENT_SOURCE=${{ vars.NEXT_PUBLIC_CONTENT_SOURCE || secrets.NEXT_PUBLIC_CONTENT_SOURCE }}
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN || secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_USER_LINE_BOT_BASIC_ID=${{ vars.NEXT_PUBLIC_USER_LINE_BOT_BASIC_ID || secrets.NEXT_PUBLIC_USER_LINE_BOT_BASIC_ID }}
