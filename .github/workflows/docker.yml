name: Build & push image to GHCR

# push 到 main 就自動 build（用 repo 根目錄的 Dockerfile）並推到 GHCR，
# 然後 Zeabur 直接拉這個 image，繞開 registry-oci.zeabur.cloud。
#
# 💸 省 Actions 分鐘數：
#  - paths-ignore：純文件 / SQL / 腳本的 commit「不會」觸發 build（這些不進 runtime image）。
#    DB migration 是本地手動跑、章節內容是同步進 DB，都不需要重建 image。
#  - concurrency cancel-in-progress：連續推好幾個 commit 時、只 build 最後一個、舊的取消。
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'supabase/**'
      - 'scripts/**'
      - '.gitignore'
      - 'bug/**'
  workflow_dispatch: {}

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # = luffysky/ai-island-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags / labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEXT_PUBLIC_* 在 build 階段被 inline 進前端 bundle，
          # 從 repo「Variables」傳入（Settings → Secrets and variables → Actions → Variables）。
          # vars 沒設就 fallback 去讀 secrets（你設在哪邊都能讀到）
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_ADMIN_SLUG=${{ vars.NEXT_PUBLIC_ADMIN_SLUG || secrets.NEXT_PUBLIC_ADMIN_SLUG }}
            NEXT_PUBLIC_GA_ID=${{ vars.NEXT_PUBLIC_GA_ID || secrets.NEXT_PUBLIC_GA_ID }}
            NEXT_PUBLIC_GTM_ID=${{ vars.NEXT_PUBLIC_GTM_ID || secrets.NEXT_PUBLIC_GTM_ID }}
            NEXT_PUBLIC_LINE_CHANNEL_ID=${{ vars.NEXT_PUBLIC_LINE_CHANNEL_ID || secrets.NEXT_PUBLIC_LINE_CHANNEL_ID }}
            NEXT_PUBLIC_CONTENT_SOURCE=${{ vars.NEXT_PUBLIC_CONTENT_SOURCE || secrets.NEXT_PUBLIC_CONTENT_SOURCE }}
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN || secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_USER_LINE_BOT_BASIC_ID=${{ vars.NEXT_PUBLIC_USER_LINE_BOT_BASIC_ID || secrets.NEXT_PUBLIC_USER_LINE_BOT_BASIC_ID }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # image 推完後、自動打 Zeabur GraphQL API 觸發該服務重部署、拉最新 image。
      # 因為 Zeabur 是 Prebuilt Image 模式、不會自己重拉 :latest、所以這裡主動觸發。
      # serviceID / environmentID 非機密、直接寫；token 放 GitHub secret。
      # ⚠️ 重點：image 已在上一步 build + push 成功。這步只是「觸發 Zeabur 重拉」、
      # 失敗不該讓整個 workflow 變紅（不然會誤以為「部署錯誤」、但其實 image 是好的）。
      # → continue-on-error + 不 exit 1；先試 restartService、失敗再試 redeployService。
      - name: Trigger Zeabur redeploy
        continue-on-error: true
        env:
          ZEABUR_API_TOKEN: ${{ secrets.ZEABUR_API_TOKEN }}
          SERVICE_ID: "6a2dd61f00b9937b8de229c3"
          ENVIRONMENT_ID: "6a00c698e5ed304c1d845a93"
        run: |
          trigger() {
            local mut="$1"
            local q="mutation { $mut(serviceID: \"$SERVICE_ID\", environmentID: \"$ENVIRONMENT_ID\") }"
            local payload; payload=$(jq -nc --arg q "$q" '{query: $q}')
            curl -sS -X POST https://api.zeabur.com/graphql \
              -H "Authorization: Bearer $ZEABUR_API_TOKEN" -H "Content-Type: application/json" -d "$payload"
          }
          resp=$(trigger "restartService")
          echo "restartService -> $resp"
          if echo "$resp" | grep -q '"errors"'; then
            resp2=$(trigger "redeployService")
            echo "redeployService -> $resp2"
            if echo "$resp2" | grep -q '"errors"'; then
              echo "::warning::Zeabur 自動重部署觸發失敗（image 已成功推上 GHCR、請到 Zeabur 手動 Restart 拉 :latest）"
            else
              echo "✅ redeployService 觸發成功"
            fi
          else
            echo "✅ restartService 觸發成功"
          fi
