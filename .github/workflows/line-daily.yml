name: LINE Daily Report

# 每天台灣時間 09:00 / 22:00 推每日報表給 admin（KPI 摘要）。
# UTC = 台灣 - 8 → 01:00 / 14:00 UTC

on:
  schedule:
    - cron: '0 1 * * *'    # 台灣 09:00 — 開工早報
    - cron: '0 14 * * *'   # 台灣 22:00 — 收工夜報
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call /api/cron/line-daily
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::SITE_URL or CRON_SECRET secret missing"
            exit 1
          fi
          # 09:00 推 daily、22:00 推 weekly 摘要
          period="daily"
          hour=$(date -u +%H)
          if [ "$hour" -ge 13 ]; then period="weekly"; fi

          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/line-daily?period=$period")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code | period=$period"
          echo "$body"
          if [ "$code" -ne 200 ]; then
            echo "::error::endpoint returned $code"
            exit 1
          fi
